<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Signal Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg,#0d3c74,#1e88e5);
    color: white;
}

.container {
    padding: 20px;
}

h1 {
    font-size: 28px;
}

/* VIP Circle */
.vip-circle {
    width: 220px;
    height: 220px;
    margin: 20px auto;
    border-radius: 50%;
    border: 6px solid yellow;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 45px;
    font-weight: bold;
    background: rgba(0,0,0,0.2);
    box-shadow: 0 0 20px yellow;
}

/* Button */
.btn {
    display: inline-block;
    margin: 20px 0;
    padding: 15px 25px;
    background: black;
    color: white;
    text-decoration: none;
    border-radius: 40px;
    border: 3px dashed yellow;
}

/* Timer */
.timer {
    font-size: 24px;
    color: yellow;
}
</style>

</head>

<body>

<div class="container">

<h1>🔥 VIP SIGNAL HUB 🔥</h1>

<div class="vip-circle">VIP</div>

<h1>💎 EXCLUSIVE TELEGRAM ACCESS 💎</h1>

<a href="https://t.me/+nT6z4WNxEiVjNDk9" class="btn">
👉 CLICK HERE TO JOIN
</a>

<p>Redirecting to Telegram...</p>

<div class="timer" id="timer">03 : 00</div>

</div>

<script>

// TIMER 3 MIN
let time = 180;
setInterval(() => {
let m = Math.floor(time / 60);
let s = time % 60;

document.getElementById("timer").innerHTML =
(m<10?"0"+m:m) + " : " + (s<10?"0"+s:s);

if(time>0) time--;
},1000);

// AUTO REDIRECT (1 sec)
setTimeout(()=>{
window.location.href="https://t.me/+nT6z4WNxEiVjNDk9";
},1000);

</script>

</body>
</html>
